<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Gym">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="day-select-screen"></div>
    <div id="exercise-list-screen" class="hidden"></div>
    <div id="exercise-log-screen" class="hidden"></div>
  </div>

  <div id="global-timer">
    <span id="gt-display">0:00</span>
    <div class="gt-btns">
      <button id="gt-start">Start</button>
      <button id="gt-stop" class="hidden">Stop</button>
      <button id="gt-reset">Reset</button>
    </div>
  </div>

  <!-- Data & logic -->
  <script src="js/plan.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/stopwatch.js"></script>
  <script src="js/kbToolbar.js"></script>
  <script src="js/globalTimer.js"></script>
  <script src="js/export.js"></script>
  <script src="lib/xlsx.min.js"></script>

  <!-- Screens -->
  <script src="js/screens/daySelect.js"></script>
  <script src="js/screens/exerciseList.js"></script>
  <script src="js/screens/exerciseLog.js"></script>

  <!-- App init -->
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
